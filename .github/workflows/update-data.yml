name: Update palm oil data

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_ai_analysis:
        description: "Generate DeepSeek AI analysis"
        required: true
        default: true
        type: boolean
  schedule:
    # GitHub Actions scheduled workflows support a shortest interval of 5 minutes.
    # Data-only refresh.
    - cron: "*/5 * * * *"
    # AI-analysis triggers, three times per trading day (Beijing time):
    #   08:30 CST (pre-market) = 00:30 UTC
    #   11:30 CST (mid-session) = 03:30 UTC
    #   15:30 CST (post-market) = 07:30 UTC
    - cron: "30 0 * * *"
    - cron: "30 3 * * *"
    - cron: "30 7 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # Distinct group prevents two update-data runs from racing on git push.
  # `pages` group is reserved for the deploy step below via job-level scope.
  group: update-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update CSV
        run: python update_data.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Comma-separated list of profiles to run (must match keys in
          # update_data.PROFILES). Default runs both P0 (palm oil) and Y0
          # (soybean oil) — expect ~2x AI wall time on scheduled AI runs.
          SYMBOLS: "P0,Y0"
          RUN_AI_ANALYSIS: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_ai_analysis) || (github.event_name == 'schedule' && contains(fromJSON('["30 0 * * *","30 3 * * *","30 7 * * *"]'), github.event.schedule)) }}

      - name: Commit updated data (with rebase-and-retry)
        # Retries push up to 4 times, rebasing on top of remote each retry.
        # This handles the race when two triggers (push + workflow_dispatch)
        # arrive close together and both finish their pipelines around the
        # same time — one wins, the other rebases + retries instead of failing.
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/p0/*.csv data/p0/*.json data/y0/*.csv data/y0/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"; exit 0
          fi
          git commit -m "Update palm oil + soybean oil data"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"; exit 0
            fi
            echo "Push failed (attempt $attempt), rebasing on remote main..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase conflict — abort"; git rebase --abort || true; exit 1; }
            sleep $((attempt * 5))
          done
          echo "All push retries failed"; exit 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    # Serialize with deploy-pages.yml so both workflows don't try to deploy
    # the same artifact at once — Pages can only accept one at a time.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 2)
        if: steps.deploy_attempt_1.outcome == 'failure'
        id: deploy_attempt_2
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 3)
        if: steps.deploy_attempt_2.outcome == 'failure'
        id: deploy_attempt_3
        uses: actions/deploy-pages@v4

      - name: Ensure deployment success
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure' && steps.deploy_attempt_3.outcome == 'failure'
        run: |
          echo "All 3 deploy attempts failed."
          exit 1

      - name: Select deployment result
        id: deployment
        if: always()
        run: |
          if [ "${{ steps.deploy_attempt_3.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy_attempt_3.outputs.page_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ steps.deploy_attempt_2.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy_attempt_2.outputs.page_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ steps.deploy_attempt_1.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy_attempt_1.outputs.page_url }}" >> $GITHUB_OUTPUT
          else
            echo "page_url=https://franksun0616.github.io/palm_dalian/" >> $GITHUB_OUTPUT
          fi
