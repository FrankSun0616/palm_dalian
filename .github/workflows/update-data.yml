name: Update palm oil data

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_ai_analysis:
        description: "Generate DeepSeek AI analysis"
        required: true
        default: true
        type: boolean
  schedule:
    # GitHub Actions scheduled workflows support a shortest interval of 5 minutes.
    - cron: "*/5 * * * *"
    # Run AI analysis on a 3-hour cadence for scheduled updates.
    - cron: "0 */3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update CSV
        run: python update_data.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RUN_AI_ANALYSIS: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_ai_analysis) || (github.event_name == 'schedule' && github.event.schedule == '0 */3 * * *') }}

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update palm oil P0 data"
          skip_dirty_check: true
          file_pattern: data/palm_oil_p0_daily.csv data/source_meta.json data/ai_analysis.json data/intraday_1h.csv data/intraday_2h.csv data/intraday_meta.json data/news_snapshot.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 2)
        if: steps.deploy_attempt_1.outcome == 'failure'
        id: deploy_attempt_2
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 3)
        if: steps.deploy_attempt_2.outcome == 'failure'
        id: deploy_attempt_3
        uses: actions/deploy-pages@v4

      - name: Ensure deployment success
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure' && steps.deploy_attempt_3.outcome == 'failure'
        run: |
          echo "All 3 deploy attempts failed."
          exit 1

      - name: Select deployment result
        id: deployment
        if: always()
        run: |
          if [ "${{ steps.deploy_attempt_3.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy_attempt_3.outputs.page_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ steps.deploy_attempt_2.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy_attempt_2.outputs.page_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ steps.deploy_attempt_1.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy_attempt_1.outputs.page_url }}" >> $GITHUB_OUTPUT
          else
            echo "page_url=https://franksun0616.github.io/palm_dalian/" >> $GITHUB_OUTPUT
          fi
