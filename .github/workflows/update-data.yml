name: Update palm oil data

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      symbols:
        description: "Symbols to update"
        required: true
        default: "P0,Y0"
        type: choice
        options:
          - "P0,Y0"
          - "P0"
          - "Y0"
  schedule:
    # GitHub Actions scheduled workflows support a shortest interval of 5 minutes.
    - cron: "*/5 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # Distinct group prevents two update-data runs from racing on git push.
  # `pages` group is reserved for the deploy step below via job-level scope.
  group: update-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update CSV
        run: python update_data.py
        env:
          # Comma-separated list of profiles to run (must match keys in
          # update_data.PROFILES). AI runs in analyze-ai.yml so a slow model or
          # market-data source cannot block the other queue.
          SYMBOLS: ${{ github.event_name == 'workflow_dispatch' && inputs.symbols || 'P0,Y0' }}
          RUN_AI_ANALYSIS: "false"
          DAILY_FETCH_TIMEOUT_SECONDS: "30"
          PYTHONUNBUFFERED: "1"

      - name: Validate dashboard data and decision invariants
        run: |
          node test_execution_logic.js
          python -m unittest -q test_model_logic.py
          python test_dashboard.py

      - name: Commit updated data (save-and-replay on push conflict)
        # When two runs (or update-data + notify) push data at the same time,
        # rebase conflicts because both wrote different JSON. Instead of
        # trying to merge, save our data → hard-reset to remote → re-apply
        # our data on top. Our data always wins because we're the latest run.
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/p0/*.csv data/p0/*.json data/y0/*.csv data/y0/*.json data/overseas.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"; exit 0
          fi
          git commit -m "Update palm oil + soybean oil data"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"; exit 0
            fi
            echo "Push failed (attempt $attempt), replaying data on top of remote..."
            BACKUP=$(mktemp -d)
            cp -a data/p0 data/y0 "$BACKUP/"
            [ -f data/overseas.json ] && cp data/overseas.json "$BACKUP/overseas.json"
            git fetch origin main
            git reset --hard origin/main
            rm -rf data/p0 data/y0
            cp -a "$BACKUP/p0" "$BACKUP/y0" data/
            [ -f "$BACKUP/overseas.json" ] && cp "$BACKUP/overseas.json" data/overseas.json
            rm -rf "$BACKUP"
            git add data/p0/*.csv data/p0/*.json data/y0/*.csv data/y0/*.json data/overseas.json 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "Remote already has our data — nothing to push"; exit 0
            fi
            git commit -m "Update palm oil + soybean oil data (retry $attempt)"
            sleep $((attempt * 3))
          done
          echo "All push retries failed"; exit 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Serialize with deploy-pages.yml so both workflows don't try to deploy
    # the same artifact at once — Pages can only accept one at a time.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 2)
        if: steps.deploy_attempt_1.outcome == 'failure'
        id: deploy_attempt_2
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 3)
        if: steps.deploy_attempt_2.outcome == 'failure'
        id: deploy_attempt_3
        uses: actions/deploy-pages@v4

      - name: Ensure deployment success
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure' && steps.deploy_attempt_3.outcome == 'failure'
        run: |
          echo "All 3 deploy attempts failed."
          exit 1

      - name: Select deployment result
        id: deployment
        if: always()
        run: |
          if [ "${{ steps.deploy_attempt_3.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy_attempt_3.outputs.page_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ steps.deploy_attempt_2.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy_attempt_2.outputs.page_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ steps.deploy_attempt_1.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy_attempt_1.outputs.page_url }}" >> $GITHUB_OUTPUT
          else
            echo "page_url=https://franksun0616.github.io/palm_dalian/" >> $GITHUB_OUTPUT
          fi
