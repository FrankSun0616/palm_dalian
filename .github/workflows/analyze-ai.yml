name: Generate DeepSeek AI analysis

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Symbols to analyze"
        required: true
        default: "P0,Y0"
        type: choice
        options:
          - "P0,Y0"
          - "P0"
          - "Y0"
  schedule:
    # Beijing times: 08:00, 11:00, 14:00, 17:00, 20:00 and 23:00.
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: analyze-ai
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      SYMBOLS: ${{ github.event_name == 'workflow_dispatch' && inputs.symbols || 'P0,Y0' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout cached bars and news
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ai.txt

      - name: Install AI-only dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ai.txt

      - name: Generate P0/Y0 analysis in parallel
        run: python run_ai_analysis.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Validate generated analysis
        run: |
          python -m unittest -q test_model_logic.py
          python test_dashboard.py

      - name: Commit AI results (save-and-replay on push conflict)
        run: |
          set -e
          FILES=()
          IFS=',' read -ra REQUESTED <<< "$SYMBOLS"
          for requested in "${REQUESTED[@]}"; do
            sym=$(echo "$requested" | tr '[:upper:]' '[:lower:]' | xargs)
            for name in ai_analysis ai_history ai_accuracy; do
              path="data/$sym/$name.json"
              [ -f "$path" ] && FILES+=("$path")
            done
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FILES[@]}"
          if git diff --cached --quiet; then
            echo "No AI changes to commit"
            exit 0
          fi
          git commit -m "Update P0/Y0 DeepSeek analysis"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt), replaying AI files on top of remote..."
            BACKUP=$(mktemp -d)
            for file in "${FILES[@]}"; do
              mkdir -p "$BACKUP/$(dirname "$file")"
              cp "$file" "$BACKUP/$file"
            done
            git fetch origin main
            git reset --hard origin/main
            for file in "${FILES[@]}"; do
              mkdir -p "$(dirname "$file")"
              cp "$BACKUP/$file" "$file"
            done
            rm -rf "$BACKUP"
            git add "${FILES[@]}"
            if git diff --cached --quiet; then
              echo "Remote already has these AI results"
              exit 0
            fi
            git commit -m "Update P0/Y0 DeepSeek analysis (retry $attempt)"
            sleep $((attempt * 3))
          done
          echo "All AI push retries failed"
          exit 1
