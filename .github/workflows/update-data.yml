name: Update palm oil data

on:
  workflow_dispatch:
  schedule:
    # Every minute. GitHub may throttle scheduled workflows, so exact timing is not guaranteed.
    - cron: "* * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update CSV
        run: python update_data.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update palm oil P0 data"
          file_pattern: data/palm_oil_p0_daily.csv data/source_meta.json
