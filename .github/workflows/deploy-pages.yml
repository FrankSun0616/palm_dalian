name: Deploy GitHub Pages

# Lightweight workflow that ONLY deploys the static site on push.
# Doesn't run any Python — so it isn't subject to the throttling that's
# delaying the heavier update-data workflow. Use this for code changes
# (HTML/JS/CSS) that need to ship immediately.
#
# update-data.yml still handles data refresh + Pages deploy on its own
# schedule; both end up producing the same Pages artifact.

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'app.js'
      - 'styles.css'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
